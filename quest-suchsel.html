<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Weihnachts-Suchsel</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --nacht: #0a1428; --gold: #c89248; --gold-hell: #f4d484; --cream: #f4ead0;
    --tinte: #2a1a0a; --himmel-text: #a8b8d5;
    --serif: "Fraunces", Georgia, serif; --sans: "Karla", system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--nacht); color: var(--cream); font-family: var(--sans); min-height: 100%; }
  .buehne { max-width: 880px; margin: 0 auto; padding: 18px 10px 40px; }
  .fortschritt { text-align: center; font-family: var(--serif); font-size: 17px; color: var(--gold-hell); margin: 0 0 12px; }
  .blatt { position: relative; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55); border-radius: 10px; overflow: hidden; }
  .blatt > img { width: 100%; display: block; user-select: none; -webkit-user-drag: none; pointer-events: none; }

  /* Interaktions-Ebene exakt über dem gedruckten Gitter */
  .gitter { position: absolute; left: 19.56%; top: 5.73%; width: 63.56%; height: 51.53%;
    display: grid; grid-template-columns: repeat(14, 1fr); grid-template-rows: repeat(11, 1fr);
    touch-action: none; user-select: none; -webkit-user-select: none; cursor: pointer; }
  .zelle { border-radius: 18%; transition: background 0.1s; mix-blend-mode: multiply; }
  .zelle.wahl { background: rgba(120, 165, 225, 0.55); }
  .zelle.fund { background: rgba(212, 150, 60, 0.55); }
  .zelle.fund.wahl { background: rgba(160, 120, 200, 0.55); }
  .zelle.fehl { animation: fehl 0.35s ease; }
  @keyframes fehl { 40% { background: rgba(225, 110, 130, 0.55); } }

  /* Marker über den gedruckten Wörtern in der Liste */
  .wortmarker { position: absolute; mix-blend-mode: multiply; border-radius: 6px;
    background: rgba(212, 150, 60, 0.4); opacity: 0; transition: opacity 0.4s; pointer-events: none; }
  .wortmarker::after { content: ""; position: absolute; left: -3%; right: -3%; top: 50%;
    height: 2.5px; background: rgba(140, 80, 20, 0.75); border-radius: 2px; transform: rotate(-1.2deg); }
  .wortmarker.gefunden { opacity: 1; }

  .erfolg { position: fixed; inset: 0; background: rgba(6, 13, 28, 0.88); backdrop-filter: blur(4px);
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
    padding: 26px; z-index: 20; opacity: 0; visibility: hidden; transition: opacity 0.5s, visibility 0.5s; }
  .erfolg.zeigen { opacity: 1; visibility: visible; }
  .erfolg h2 { font-family: var(--serif); font-size: clamp(26px, 6vw, 40px); font-weight: 500; color: var(--gold-hell); margin: 0 0 10px; }
  .erfolg p { color: var(--himmel-text); font-size: 15px; max-width: 420px; line-height: 1.6; margin: 0 0 26px; }
  .knopf { background: var(--gold); color: var(--tinte); border: 1px solid var(--gold-hell); padding: 12px 28px;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--sans); text-decoration: none; display: inline-block; }
  .knopf:hover { background: #dba458; }
  .flocke { position: fixed; top: -20px; color: var(--gold-hell); z-index: 21; animation: fallen linear forwards; pointer-events: none; }
  @keyframes fallen { to { transform: translateY(110vh) rotate(360deg); opacity: 0.3; } }
  .zurueck { display: block; text-align: center; margin-top: 20px; }
  .zurueck a { color: var(--himmel-text); font-size: 13px; text-decoration: none; }
  .zurueck a:hover { color: var(--gold-hell); }
</style>
</head>

  const BOXEN = {"Abeena": [21.61, 74.7, 7.26], "Doris": [35.57, 74.7, 4.73], "Hannah": [55.99, 74.7, 7.33], "Secco": [76.26, 74.7, 5.84], "Bauch": [21.77, 79.6, 5.91], "Ensemble": [35.57, 79.6, 9.38], "Hexe": [55.99, 79.6, 4.5], "Valentin": [76.26, 79.6, 7.73], "Bertram": [21.77, 84.7, 7.49], "Forum": [35.57, 84.7, 5.84], "Jackson": [55.84, 84.7, 7.57], "Vater": [76.18, 84.7, 5.4], "Boom": [21.77, 89.6, 5.44], "Gerda": [35.49, 89.6, 5.6], "Phoenix": [55.91, 89.6, 7.57], "Veronika": [76.18, 89.6, 8.9], "Dennah": [21.77, 94.7, 7.26], "Geschichten": [35.49, 94.7, 11.91], "Rolle": [55.91, 94.7, 4.65], "X-Mas": [76.26, 94.7, 6.2]};
  const R = GITTER.length, C = GITTER[0].length;
  const gefunden = new Set();

  const gitterEl = document.getElementById('gitter');
  const zellen = [];
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) {
    const z = document.createElement('div');
    z.className = 'zelle';
    gitterEl.appendChild(z);
    zellen.push(z);
  }
  // Marker über den gedruckten Listen-Wörtern
  const markerEls = {};
  const markerEbene = document.getElementById('marker-ebene');
  WORTE.forEach(([anzeige, such]) => {
    const b = BOXEN[anzeige];
    if (!b) return;
    const m = document.createElement('div');
    m.className = 'wortmarker';
    m.style.left = (b[0] - 0.5) + '%';
    m.style.top = (b[1] - 0.35) + '%';
    m.style.width = (b[2] + 1.2) + '%';
    m.style.height = '2.6%';
    markerEbene.appendChild(m);
    markerEls[such] = m;
  });

  let actx = null;
  function plink(freq) {
    try {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      if (actx.state === 'suspended') actx.resume();
      const now = actx.currentTime;
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.13, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      o.connect(g).connect(actx.destination);
      o.start(now); o.stop(now + 0.27);
    } catch (e) {}
  }

  let start = null, aktuelleWahl = [];
  function zelleAn(px, py) {
    const rect = gitterEl.getBoundingClientRect();
    const c = Math.floor((px - rect.left) / (rect.width / C));
    const r = Math.floor((py - rect.top) / (rect.height / R));
    if (r < 0 || r >= R || c < 0 || c >= C) return null;
    return { r: r, c: c };
  }
  function linieVon(a, b) {
    const dR = b.r - a.r, dC = b.c - a.c;
    if (dR === 0 && dC === 0) return [a];
    let dr = 0, dc = 0, len = 0;
    if (dR === 0) { dc = Math.sign(dC); len = Math.abs(dC); }
    else if (dC === 0) { dr = Math.sign(dR); len = Math.abs(dR); }
    else if (Math.abs(Math.abs(dR) - Math.abs(dC)) <= Math.max(Math.abs(dR), Math.abs(dC)) * 0.5) {
      dr = Math.sign(dR); dc = Math.sign(dC); len = Math.min(Math.abs(dR), Math.abs(dC));
    } else if (Math.abs(dR) > Math.abs(dC)) { dr = Math.sign(dR); len = Math.abs(dR); }
    else { dc = Math.sign(dC); len = Math.abs(dC); }
    const punkte = [];
    for (let i = 0; i <= len; i++) {
      const r = a.r + dr * i, c = a.c + dc * i;
      if (r < 0 || r >= R || c < 0 || c >= C) break;
      punkte.push({ r: r, c: c });
    }
    return punkte;
  }
  function zeichneWahl(punkte) {
    aktuelleWahl.forEach(p => zellen[p.r * C + p.c].classList.remove('wahl'));
    aktuelleWahl = punkte;
    punkte.forEach(p => zellen[p.r * C + p.c].classList.add('wahl'));
  }
  function pruefeWahl() {
    if (aktuelleWahl.length < 2) { zeichneWahl([]); return; }
    const buchstaben = aktuelleWahl.map(p => GITTER[p.r][p.c]).join('');
    const rueck = buchstaben.split('').reverse().join('');
    const treffer = WORTE.find(([_, such]) => !gefunden.has(such) && (such === buchstaben || such === rueck));
    if (treffer) {
      const such = treffer[1];
      gefunden.add(such);
      aktuelleWahl.forEach(p => zellen[p.r * C + p.c].classList.add('fund'));
      if (markerEls[such]) markerEls[such].classList.add('gefunden');
      document.getElementById('anzahl').textContent = gefunden.size;
      plink(520 + gefunden.size * 30);
      if (gefunden.size === WORTE.length) setTimeout(feier, 700);
    } else {
      aktuelleWahl.forEach(p => {
        const z = zellen[p.r * C + p.c];
        z.classList.add('fehl');
        setTimeout(() => z.classList.remove('fehl'), 380);
      });
    }
    zeichneWahl([]);
  }
  gitterEl.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    const z = zelleAn(e.clientX, e.clientY);
    if (!z) return;
    start = z;
    zeichneWahl([z]);
  });
  gitterEl.addEventListener('pointermove', (e) => {
    if (!start) return;
    e.preventDefault();
    const z = zelleAn(e.clientX, e.clientY);
    if (!z) return;
    zeichneWahl(linieVon(start, z));
  });
  function ende() { if (!start) return; start = null; pruefeWahl(); }
  window.addEventListener('pointerup', ende);
  window.addEventListener('pointercancel', ende);

  function feier() {
    plink(880); setTimeout(() => plink(1100), 130); setTimeout(() => plink(1320), 260);
    document.getElementById('erfolg').classList.add('zeigen');
    for (let i = 0; i < 26; i++) {
      setTimeout(() => {
        const f = document.createElement('span');
        f.className = 'flocke';
        f.textContent = ['❄', '✦', '★', '❅'][i % 4];
        f.style.left = Math.random() * 100 + 'vw';
        f.style.animationDuration = (2.6 + Math.random() * 2.5) + 's';
        f.style.fontSize = (13 + Math.random() * 14) + 'px';
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 6000);
      }, i * 160);
    }
  }
})();
</script>
</body>
